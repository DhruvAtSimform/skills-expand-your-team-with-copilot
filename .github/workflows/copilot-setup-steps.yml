name: "Copilot Setup Steps"

on: workflow_dispatch
jobs:
  # This is the required job name. If different, Copilot will ignore it.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Starts a MongoDB service for Copilot to use during its session.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    # Grant Copilot early access to read the repository content.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Start backend server
        run: |
          cd src
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          echo "Backend server started (PID $!)"
          # Wait for the server to be ready
          for i in $(seq 1 15); do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "Backend is up after ${i}s"
              break
            fi
            echo "Waiting for backend... (${i}s)"
            sleep 1
          done
